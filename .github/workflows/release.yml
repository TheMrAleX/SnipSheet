name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev

      - name: Build raylib (static)
        run: |
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib/src
          make PLATFORM=PLATFORM_DESKTOP -j"$(nproc)"
          sudo make install PLATFORM=PLATFORM_DESKTOP
          sudo ldconfig

      - name: Compile SpraySheetCut
        run: |
          g++ -O2 -std=c++17 main.cpp -o spraysheetcut \
            /usr/local/lib/libraylib.a \
            -lGL -lm -lpthread -ldl -lrt -lX11

      - name: Rename binary
        run: mv spraysheetcut spraysheetcut-linux-x86_64

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: spraysheetcut-linux-x86_64
          generate_release_notes: true
