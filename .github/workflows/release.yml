name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: spraysheetcut-linux-x86_64
          - os: windows-latest
            asset: spraysheetcut-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Linux ----------
      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev

      - name: Linux build raylib
        if: matrix.os == 'ubuntu-22.04'
        run: |
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib/src
          make PLATFORM=PLATFORM_DESKTOP -j"$(nproc)"
          sudo make install PLATFORM=PLATFORM_DESKTOP

      - name: Linux compile
        if: matrix.os == 'ubuntu-22.04'
        run: |
          g++ -O2 -std=c++17 main.cpp -o "${{ matrix.asset }}" \
            /usr/local/lib/libraylib.a \
            -lGL -lm -lpthread -ldl -lrt -lX11

      # ---------- Windows ----------
      - name: Setup MSYS2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make
            git

      - name: Windows build raylib
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git /tmp/raylib
          cd /tmp/raylib/src
          make PLATFORM=PLATFORM_DESKTOP -j"$(nproc)"

      - name: Windows compile
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          g++ -O2 -std=c++17 main.cpp -o "${{ matrix.asset }}" \
            /tmp/raylib/src/libraylib.a \
            -static -lopengl32 -lgdi32 -lwinmm

      # ---------- Upload artifact ----------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
